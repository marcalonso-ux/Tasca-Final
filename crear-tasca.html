<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestió de Categories</title>
    <link rel="stylesheet" href="CSS/style.css">

</head>
<body>
    <section class="DivDos">
        <div class="sidebar">
            <p>MENÚ</p>
            <li>
                <a href="index.html" onclick="IrIndex()">Llistat d'Activitats</a>
            </li>

            <li>
                <a href="crear-tasca.html" onclick="IrCrear()">Crear Tasca</a>
            </li>

            <li>
                <a href="categories.html" onclick="IrCateg()">Categories</a>
            </li>
        </div>

        <section class="body">
            <p>Crear Nova Tasca</p>

            <div class="parteCrear">
               <section class="info">
                    <p>Títol:</p>
                    <input type="text" name="titol-name" id="titol_name">
                    <p>Descripció:</p>
                    <input type="text" name="Descripció Titol" id="titol_descripcio">
                    <p>Data:</p>
                    <input type="date"  id="fecha" name="fecha">
                    <p>Categoria:</p>
                    <select id="opcionesCat" name="opciones Categoria">
                        <option value="estudis">Estudis</option>
                    </select>
                    <p>Prioritat:</p>
                    <select id="opcionesPrio" name="opciones Prioritat">
                        <option value="alta">Alta</option>
                        <option value="mitjana">Mitjana</option>
                        <option value="baixa">Baixa</option>
                    </select>
                    <button class="NovaT">Crear Tasca</button>

               </section> 
            </div>
        </section>

    </section>
    <script type="module" src="JS/index.js"></script>

</body>
</html>
